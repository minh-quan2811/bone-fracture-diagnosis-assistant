version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: bone_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    image: ${ECR_IMAGE}
    container_name: bone_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - /home/ubuntu/app/.env
    environment:
      ENV_MODE: production
    depends_on:
      - redis
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  celery_worker:
    image: ${ECR_IMAGE}
    container_name: bone_celery
    restart: unless-stopped
    env_file:
      - /home/ubuntu/app/.env
    environment:
      ENV_MODE: production
    depends_on:
      - redis
    command: >
      celery -A celery_app worker
      --loglevel=info
      -Q fracture_queue,document_queue
      --concurrency=2